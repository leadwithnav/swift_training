kind: Deployment
metadata:
  name: inventory-api
  namespace: break-fix-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
      - name: api
        image: busybox
        command: ["/bin/sh", "-c", "sleep 3600"]
        envFrom:
        - configMapRef:
            name: api-config-wrong
