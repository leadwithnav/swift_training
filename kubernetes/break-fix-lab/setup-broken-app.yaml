apiVersion: v1
kind: Namespace
metadata:
  name: break-fix-lab
---
# 1. FRONTEND SERVICE (Bug: Selector mismatch)
apiVersion: v1
kind: Service
metadata:
  name: inventory-frontend-svc
  namespace: break-fix-lab
spec:
  type: NodePort
  selector:
    app: inventory-ui # BUG: Should be inventory-frontend
  ports:
  - port: 80
    targetPort: 80
---
# 2. FRONTEND DEPLOYMENT (Healthy, but unreachable due to above)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-frontend
  namespace: break-fix-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-frontend
  template:
    metadata:
      labels:
        app: inventory-frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# 3. BACKEND API CONFIGMAP (Healthy)
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-api-config
  namespace: break-fix-lab
data:
  DB_HOST: "inventory-db-svc"
---
# 4. BACKEND API DEPLOYMENT (Bug: References wrong configmap)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: break-fix-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
      - name: api
        image: busybox
        command: ["/bin/sh", "-c", "sleep 3600"]
        envFrom:
        - configMapRef:
            name: api-config-wrong # BUG: Should be inventory-api-config
---
# 5. BACKGROUND WORKER REPLICASET (Bug: Bad image)
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: inventory-worker
  namespace: break-fix-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-worker
  template:
    metadata:
      labels:
        app: inventory-worker
    spec:
      containers:
      - name: worker
        image: busybox:1.99.9-typo # BUG: Image doesn't exist
        command: ["/bin/sh", "-c", "sleep 3600"]
---
# 6. DATABASE HEADLESS SERVICE (Healthy)
apiVersion: v1
kind: Service
metadata:
  name: inventory-db-svc
  namespace: break-fix-lab
spec:
  clusterIP: None
  selector:
    app: inventory-db
  ports:
  - port: 5432
---
# 7. DATABASE STATEFULSET (Bug: Requests non-existent StorageClass)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inventory-db
  namespace: break-fix-lab
spec:
  serviceName: "inventory-db-svc"
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
    spec:
      containers:
      - name: postgres
        image: postgres:13
        env:
        - name: POSTGRES_PASSWORD
          value: "secret123"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ultra-fast-ssd # BUG: This storage class doesn't exist
      resources:
        requests:
          storage: 1Gi
