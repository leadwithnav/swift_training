apiVersion: v1
kind: LimitRange
metadata:
  name: project-limits
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 50m
      memory: 128Mi
    type: Container
---
# FRONTEND - Issue 1: Requests way too much CPU (10 cores). Won't schedule.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        resources:
          requests:
            cpu: "10" # BUG 1: Too much CPU!
---
# FRONTEND PDB - Issue 2: PDB misconfigured
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
spec:
  minAvailable: 5 # BUG 2: Requires 5, but deployment only has 2 replicas
  selector:
    matchLabels:
      app: frontend
---
# BACKEND - Issue 3: Missing CPU requests, HPA will fail
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:alpine
        ports:
        - containerPort: 80
        # BUG 3: Missing resources.requests.cpu
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
---
# DATABASE - Issue 4: Unschedulable due to impossible PodAntiAffinity
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
spec:
  replicas: 2
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - database
            topologyKey: "topology.kubernetes.io/non-existent-zone" # BUG 4: Fake topology key
      containers:
      - name: database
        image: redis:alpine
---
# NETWORK POLICY - Issue 5: Frontend to Backend blocked
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: wrong-frontend # BUG 5: Typo in label
    ports:
    - port: 80
      protocol: TCP
---
# ROUTE - Issue 6: Route points to wrong port
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend-route
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: 8080 # BUG 6: Frontend service only exposes 80!
---
# RBAC - Issue 7: RoleBinding typo prevents job from reading configmaps
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migrator-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migrator-role
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migrator-binding
subjects:
- kind: ServiceAccount
  name: migrator-serviceaccount # BUG 7: Typo, should be migrator-sa
roleRef:
  kind: Role
  name: migrator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrator
spec:
  template:
    spec:
      serviceAccountName: migrator-sa
      containers:
      - name: migrator
        image: bitnami/kubectl:latest
        command: ["kubectl", "get", "configmaps"]
      restartPolicy: Never
