apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-frontend
  namespace: break-fix-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-frontend
  template:
    metadata:
      labels:
        app: inventory-frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
